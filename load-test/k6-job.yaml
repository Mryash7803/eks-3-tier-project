apiVersion: batch/v1
kind: Job
metadata:
  name: k6-load-test
  namespace: production
spec:
  backoffLimit: 0
  template:
    spec:
      containers:
        - name: k6
          image: grafana/k6:latest
          args: ["run", "/scripts/backend.js"]
          volumeMounts:
            - name: script
              mountPath: /scripts
      restartPolicy: Never
      volumes:
        - name: script
          configMap:
            name: k6-backend-script
