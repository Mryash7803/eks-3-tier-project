apiVersion: v1
kind: Pod
metadata:
  name: ebs-test-pod
  namespace: production
spec:
  containers:
    - name: test-container
      image: public.ecr.aws/docker/library/alpine:3.22
      command:
        - /bin/sh
        - -c
        - |
          echo "EBS persistent storage test" > /data/test.txt
          echo "Created at: $(date)" >> /data/test.txt
          sleep 3600
      resources:
        requests:
          cpu: 25m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 64Mi
      volumeMounts:
        - name: persistent-storage
          mountPath: /data

  volumes:
    - name: persistent-storage
      persistentVolumeClaim:
        claimName: ebs-test-pvc
