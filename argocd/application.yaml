apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: eks-3-tier-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/Mryash7803/eks-3-tier-project.git
    targetRevision: main
    path: helm/eks-3-tier-app

  destination:
    server: https://kubernetes.default.svc
    namespace: production

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
