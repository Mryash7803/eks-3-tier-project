{{- if .Values.backend.rollout.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: backend-success-rate
  labels:
    {{- include "eks-3-tier-app.labels" . | nindent 4 }}
spec:
  args:
    - name: service-name
  metrics:
    - name: success-rate
      interval: 30s
      successCondition: result[0] >= 0.95
      failureLimit: 3
      provider:
        prometheus:
          address: {{ .Values.monitoring.prometheus.address | default "http://prometheus-operated.monitoring.svc.cluster.local:9090" }}
          query: |
            sum(rate(http_requests_total{status=~"2.*",app="{{ `{{args.service-name}}` }}"}[1m]))
            /
            sum(rate(http_requests_total{app="{{ `{{args.service-name}}` }}"}[1m]))
{{- end }}
